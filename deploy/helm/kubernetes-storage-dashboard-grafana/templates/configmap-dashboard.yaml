{{- if .Values.dashboard.enabled -}}
{{- $catsObjList := list -}}
{{- range .Values.dashboard.categories -}}
{{- $catsObjList = append $catsObjList (dict "id" (index . 0) "color" (index . 1) "label" (index . 2)) -}}
{{- end -}}
{{- $catsObj := $catsObjList | toJson -}}
{{- $tmpl := .Files.Get "files/storage-usage.tmpl.json" -}}
{{- $rendered := $tmpl
    | replace "__METRIC_PREFIX__" .Values.exporter.metricPrefix
    | replace "__DATASOURCE_UID__" .Values.dashboard.datasourceUid
    | replace "__CATEGORIES_OBJ_JSON__" $catsObj
-}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ksdg.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksdg.labels" . | nindent 4 }}
    {{ .Values.dashboard.sidecarLabel.name }}: {{ .Values.dashboard.sidecarLabel.value | quote }}
data:
  storage-usage.json: |
{{ $rendered | indent 4 }}
{{- end }}
