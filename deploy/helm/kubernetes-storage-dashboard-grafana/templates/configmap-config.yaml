apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ksdg.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksdg.labels" . | nindent 4 }}
data:
  # Rendered overlay. Deep-merged at startup with the container's
  # /etc/storage-exporter/defaults.yaml; values here win. Omitting
  # `categories:` lets the defaults shine through; setting it
  # replaces the default list wholesale.
  config.yaml: |
    metric_prefix: {{ .Values.exporter.metricPrefix }}
    interval_seconds: {{ .Values.exporter.intervalSeconds }}
    du_timeout_seconds: {{ .Values.exporter.duTimeoutSeconds }}
    listen_port: {{ .Values.exporter.listenPort }}
    plugins_dir: /etc/storage-exporter/plugins.d
    {{- if .Values.exporter.categories }}
    categories:
{{ toYaml .Values.exporter.categories | indent 6 }}
    {{- end }}
