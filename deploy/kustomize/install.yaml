# Source: kubernetes-storage-dashboard-grafana/templates/configmap-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-storage-dashboard-grafana-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: kubernetes-storage-dashboard-grafana-0.1.1
data:
  # Rendered overlay. Deep-merged at startup with the container's
  # /etc/storage-exporter/defaults.yaml; values here win. Omitting
  # `categories:` lets the defaults shine through; setting it
  # replaces the default list wholesale.
  config.yaml: |
    metric_prefix: nsd
    interval_seconds: 300
    du_timeout_seconds: 30
    listen_port: 9101
    plugins_dir: /etc/storage-exporter/plugins.d
---
