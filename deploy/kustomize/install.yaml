# Source: kubernetes-storage-dashboard-grafana/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-storage-dashboard-grafana
  labels:
    app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: kubernetes-storage-dashboard-grafana-0.1.1
rules:
  # The exporter hits kubelet /stats/summary on each node via the
  # apiserver proxy to get imageFs + per-pod ephemeral usage from
  # kubelet's CRI accounting (sub-second, no fs walk).
  - apiGroups: [""]
    resources: ["nodes/proxy", "nodes/stats"]
    verbs: ["get"]
