apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-storage-dashboard-grafana-dashboard
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: kubernetes-storage-dashboard-grafana-0.1.1
    grafana_dashboard: "1"
data:
  storage-usage.json: |
    {
      "annotations": {"list": []},
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "uid": "storage-usage",
      "title": "Storage Usage",
      "tags": ["storage", "nodes"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "1m",
      "time": {"from": "now-5m", "to": "now"},
      "timepicker": {"refresh_intervals": ["1m", "5m"], "time_options": ["5m"]},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1,
          "type": "appmana-storage-breakdown-panel",
          "pluginVersion": "0.1.0",
          "title": "",
          "transparent": true,
          "gridPos": {"h": 26, "w": 24, "x": 0, "y": 0},
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "options": {
            "metricPrefix": "nsd",
            "categories": [{"color":"#3B82F6","id":"containerd-images","label":"Containerd images"},{"color":"#10B981","id":"longhorn","label":"Longhorn data"},{"color":"#A855F7","id":"pod-ephemeral","label":"Pod ephemeral"},{"color":"#64748B","id":"local-path-pvc","label":"Local-path PVCs"},{"color":"#22D3EE","id":"local-path-cache","label":"Local-path caches"},{"color":"#FBBF24","id":"buildkit","label":"BuildKit"},{"color":"#F97316","id":"dockerd","label":"Dockerd"},{"color":"#B877D9","id":"fscache","label":"NFS/SMB cache"},{"color":"#73BF69","id":"apt-cache","label":"APT cache"},{"color":"#F59E0B","id":"journald","label":"Journald logs"},{"color":"#FFB357","id":"snap","label":"Snap"},{"color":"#EF4444","id":"home","label":"Home"},{"color":"#FF7383","id":"crash-dumps","label":"Kernel crash dumps"},{"color":"#6B7280","id":"swap","label":"Swap"}],
            "showFree": true,
            "showOther": true,
            "rowHeight": 22,
            "sortMode": "node-asc"
          },
          "targets": [
            {
              "refId": "size",
              "expr": "nsd_node_filesystem_size_bytes",
              "instant": true,
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            },
            {
              "refId": "used",
              "expr": "nsd_node_filesystem_used_bytes",
              "instant": true,
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            },
            {
              "refId": "categories",
              "expr": "nsd_node_storage_bytes",
              "instant": true,
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            },
            {
              "refId": "longhorn",
              "expr": "sum by (node, disk_path) (longhorn_replica_info * on(volume) group_left() longhorn_volume_actual_size_bytes)",
              "instant": true,
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ]
        }
      ]
    }
