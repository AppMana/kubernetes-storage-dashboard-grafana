# Source: kubernetes-storage-dashboard-grafana/templates/daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubernetes-storage-dashboard-grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: kubernetes-storage-dashboard-grafana-0.1.1
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
      app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-storage-dashboard-grafana
        app.kubernetes.io/instance: kubernetes-storage-dashboard-grafana
      annotations:
        # Roll pods when the config or plugins ConfigMaps change content.
        ksdg/config-hash: 8ffe5139de424cfe95813622e0f78c939f1c35d8af9d27009b7bf8b252a13bd2
        ksdg/plugins-hash: 01ba4719c80b6fe911b091a7c05124b64eeece964e09c058ef8f9805daca546b
    spec:
      serviceAccountName: kubernetes-storage-dashboard-grafana
      hostPID: true
      hostNetwork: false
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      securityContext:
        # Root is required to read /proc/swaps, /proc/1/mounts, and
        # most /var/lib/* paths the du collector walks. The pod has no
        # privileged flag, no extra capabilities, and is read-only on
        # the host bind-mount.
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: exporter
          image: ghcr.io/appmana/kubernetes-storage-dashboard-grafana:0.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONFIG_FILE
              value: /etc/storage-exporter/config.yaml
          ports:
            - name: metrics
              containerPort: 9101
              protocol: TCP
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 32Mi
          readinessProbe:
            httpGet: { path: /metrics, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/storage-exporter/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: host
              mountPath: /host
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kubernetes-storage-dashboard-grafana-config
            defaultMode: 0444
        - name: host
          hostPath:
            path: /
            type: Directory
